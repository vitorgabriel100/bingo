server.port=${PORT:8080}

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5433/bingo_db?sslmode=disable}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:1027}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=false

cors.allowed.origins=${CORS_ALLOWED_ORIGINS:*}

jwt.secret=${JWT_SECRET:c3VhLWNoYXZlLXN1cGVyLXNlY3JldGEtY29tLXBlaG8tbWVub3MtMzItY2FyYWN0ZXJlcw==}
jwt.expiration=${JWT_EXPIRATION:86400000}

logging.level.org.springframework=INFO
logging.level.com.empresa.bingo=DEBUG

app.name=Bingo Application
app.version=1.0.0